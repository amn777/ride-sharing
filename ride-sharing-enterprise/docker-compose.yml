networks:
  ride-net:
    driver: bridge

volumes:
  postgres-data:
  mongo-data:
  redis-data:
  kafka-data:
  zookeeper-data:

services:

  # ─── Infrastructure ───────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper
    networks: [ride-net]
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks: [ride-net]
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:29092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rideuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ridepass123}
      POSTGRES_DB: ridesharing
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks: [ride-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rideuser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-rideadmin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mongopass123}
    volumes:
      - mongo-data:/data/db
    networks: [ride-net]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass123}
    volumes:
      - redis-data:/data
    networks: [ride-net]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Spring Cloud ─────────────────────────────────────────────────────────

  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks: [ride-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      eureka-server:
        condition: service_healthy
    environment:
      EUREKA_URI: http://eureka-server:8761/eureka
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-min-32-chars-long}
    networks: [ride-net]

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      EUREKA_URI: http://eureka-server:8761/eureka
      POSTGRES_URL: jdbc:postgresql://postgres:5432/ridesharing
      POSTGRES_USER: ${POSTGRES_USER:-rideuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ridepass123}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-min-32-chars-long}
    networks: [ride-net]

  driver-service:
    build:
      context: .
      dockerfile: driver-service/Dockerfile
    container_name: driver-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      EUREKA_URI: http://eureka-server:8761/eureka
      POSTGRES_URL: jdbc:postgresql://postgres:5432/ridesharing
      POSTGRES_USER: ${POSTGRES_USER:-rideuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ridepass123}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass123}
      KAFKA_BOOTSTRAP: kafka:29092
    networks: [ride-net]

  ride-service:
    build:
      context: .
      dockerfile: ride-service/Dockerfile
    container_name: ride-service
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      EUREKA_URI: http://eureka-server:8761/eureka
      MONGO_URI: mongodb://${MONGO_USER:-rideadmin}:${MONGO_PASSWORD:-mongopass123}@mongodb:27017/rides?authSource=admin
      KAFKA_BOOTSTRAP: kafka:29092
    networks: [ride-net]

  matching-service:
    build:
      context: .
      dockerfile: matching-service/Dockerfile
    container_name: matching-service
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      EUREKA_URI: http://eureka-server:8761/eureka
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass123}
      KAFKA_BOOTSTRAP: kafka:29092
    networks: [ride-net]

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: notification-service
    depends_on:
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      EUREKA_URI: http://eureka-server:8761/eureka
      KAFKA_BOOTSTRAP: kafka:29092
    networks: [ride-net]

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: payment-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      EUREKA_URI: http://eureka-server:8761/eureka
      POSTGRES_URL: jdbc:postgresql://postgres:5432/ridesharing
      POSTGRES_USER: ${POSTGRES_USER:-rideuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ridepass123}
      KAFKA_BOOTSTRAP: kafka:29092
    networks: [ride-net]

  rating-service:
    build:
      context: .
      dockerfile: rating-service/Dockerfile
    container_name: rating-service
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      EUREKA_URI: http://eureka-server:8761/eureka
      MONGO_URI: mongodb://${MONGO_USER:-rideadmin}:${MONGO_PASSWORD:-mongopass123}@mongodb:27017/ratings?authSource=admin
      KAFKA_BOOTSTRAP: kafka:29092
    networks: [ride-net]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks: [ride-net]
