server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/ridesharing}
    username: ${POSTGRES_USER:rideuser}
    password: ${POSTGRES_PASSWORD:ridepass123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:change-this-secret-min-32-chars-long}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.ridesharing: DEBUG
